name: Build And Publish Release Assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_archives:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build release archives
        run: |
          set -e
          VERSION_CLEAN="${VERSION#v}"
          python scripts/build_release_package.py --version "$VERSION_CLEAN"

      - name: Upload archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: |
            dist/*.zip
            dist/*.tar.gz

  build_windows_installer:
    runs-on: windows-latest
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Patch config version for installer build
        shell: pwsh
        run: |
          cd $env:GITHUB_WORKSPACE
          $version = "${env:VERSION}".TrimStart('v')
          "VERSION_CLEAN=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (Test-Path "SupportX-App/config/config.json") {
            $configPath = "SupportX-App/config/config.json"
          } else {
            $configPath = "config/config.json"
          }
          $json = Get-Content $configPath -Raw | ConvertFrom-Json
          $json.app_version = $version
          $json.auto_update = $true
          $json | ConvertTo-Json -Depth 20 | Set-Content -Encoding UTF8 $configPath

      - name: Build Windows installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: scripts/windows/SupportXInstaller.iss
          options: /DMyAppVersion=${{ env.VERSION_CLEAN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: dist/SupportX-Setup-v*.exe

  release:
    runs-on: ubuntu-latest
    needs:
      - build_archives
      - build_windows_installer

    steps:
      - name: Download archive artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-archives
          path: dist

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-installer
          path: dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.exe
          generate_release_notes: true
